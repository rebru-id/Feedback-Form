<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rebru.id — Visitor Feedback</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --brown: #3b2a1a;
        --coffee: #6b4226;
        --caramel: #c4843a;
        --cream: #f5efe4;
        --white: #fdfaf5;
        --grey: #9e8e7e;
        --red: #c0392b;
      }
      body {
        background: var(--cream);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 15% 20%,
            rgba(107, 66, 38, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 80%,
            rgba(196, 132, 58, 0.1) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }
      .card {
        position: relative;
        z-index: 1;
        background: var(--white);
        border-radius: 24px;
        box-shadow:
          0 8px 48px rgba(59, 42, 26, 0.14),
          0 1px 0 rgba(255, 255, 255, 0.8) inset;
        width: 100%;
        max-width: 580px;
        overflow: hidden;
      }
      .header {
        background: var(--brown);
        padding: 32px 36px 28px;
        position: relative;
        overflow: hidden;
      }
      .header::after {
        content: "☕";
        position: absolute;
        right: 28px;
        top: 18px;
        font-size: 64px;
        opacity: 0.08;
        line-height: 1;
      }
      .logo-tag {
        display: inline-block;
        background: var(--caramel);
        color: var(--white);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 100px;
        margin-bottom: 14px;
      }
      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--white);
        font-size: 28px;
        line-height: 1.25;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .header p {
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        font-weight: 300;
      }
      .body {
        padding: 32px 36px 36px;
      }
      .field {
        margin-bottom: 22px;
      }
      .field > label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--coffee);
        margin-bottom: 8px;
      }
      .field > label .req {
        color: var(--caramel);
        margin-left: 2px;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea {
        width: 100%;
        background: var(--cream);
        border: 1.5px solid rgba(107, 66, 38, 0.15);
        border-radius: 12px;
        padding: 13px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        color: var(--brown);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        -webkit-appearance: none;
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--grey);
      }
      input:focus,
      textarea:focus {
        border-color: var(--caramel);
        box-shadow: 0 0 0 3px rgba(196, 132, 58, 0.12);
      }
      input[aria-invalid="true"],
      textarea[aria-invalid="true"] {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
      }
      textarea {
        resize: none;
        min-height: 100px;
        line-height: 1.6;
      }
      .field-error {
        display: block;
        font-size: 12px;
        color: var(--red);
        margin-top: 5px;
        min-height: 16px;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .products-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .product-item {
        position: relative;
        cursor: pointer;
      }
      .product-item input[type="checkbox"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }
      .product-label {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--cream);
        border: 1.5px solid rgba(107, 66, 38, 0.15);
        border-radius: 12px;
        padding: 11px 14px;
        cursor: pointer;
        user-select: none;
        transition:
          border-color 0.2s,
          background 0.2s;
        min-height: 44px;
      }
      .product-item input:checked + .product-label {
        border-color: var(--caramel);
        background: rgba(196, 132, 58, 0.08);
      }
      .product-icon {
        font-size: 20px;
        flex-shrink: 0;
      }
      .product-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--brown);
        line-height: 1.3;
      }
      .stars {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 2px;
      }
      .stars input {
        display: none;
      }
      .stars label {
        font-size: 32px;
        cursor: pointer;
        line-height: 1;
        color: rgba(107, 66, 38, 0.2);
        transition: color 0.15s;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
      .stars label:hover,
      .stars label:hover ~ label,
      .stars input:checked ~ label {
        color: var(--caramel);
      }
      .divider {
        border: none;
        border-top: 1px solid rgba(107, 66, 38, 0.1);
        margin: 4px 0 24px;
      }
      .btn-submit {
        width: 100%;
        background: var(--brown);
        color: var(--white);
        border: none;
        border-radius: 14px;
        padding: 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s,
          box-shadow 0.2s;
        margin-top: 8px;
      }
      .btn-submit:hover:not(:disabled) {
        background: var(--coffee);
        box-shadow: 0 4px 20px rgba(59, 42, 26, 0.25);
      }
      .btn-submit:active:not(:disabled) {
        transform: scale(0.98);
      }
      .btn-submit:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        background: #2d1a0e;
        color: #fff;
        font-size: 13px;
        padding: 12px 20px;
        border-radius: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s,
          transform 0.25s;
        z-index: 100;
      }
      #toast.toast--visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .thankyou {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 36px;
        min-height: 340px;
      }
      .thankyou.show {
        display: flex;
      }
      .form-section.hide {
        display: none;
      }
      .ty-icon {
        width: 72px;
        height: 72px;
        background: rgba(74, 124, 89, 0.12);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 20px;
        animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes popIn {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .ty-title {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: var(--brown);
        margin-bottom: 10px;
      }
      .ty-sub {
        font-size: 14px;
        color: var(--grey);
        line-height: 1.6;
        max-width: 300px;
        margin-bottom: 32px;
      }
      .btn-reset {
        background: transparent;
        border: 1.5px solid rgba(107, 66, 38, 0.25);
        border-radius: 12px;
        padding: 12px 28px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--coffee);
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .btn-reset:hover {
        border-color: var(--caramel);
        background: rgba(196, 132, 58, 0.06);
      }
      @media (max-width: 420px) {
        .header {
          padding: 24px 24px 20px;
        }
        .header h1 {
          font-size: 23px;
        }
        .body {
          padding: 24px 24px 28px;
        }
        .row-2,
        .products-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="logo-tag">Rebru.id · Makassar</div>
        <h1>Tell Us What You Think</h1>
        <p>Your feedback helps us grow our circular economy mission.</p>
      </div>

      <div class="body form-section" id="formSection">
        <div class="field">
          <label for="name"
            >Your Name <span class="req" aria-hidden="true">*</span></label
          >
          <input
            type="text"
            id="name"
            placeholder="Full name"
            autocomplete="off"
            aria-required="true"
            aria-describedby="name-error"
          />
          <span id="name-error" class="field-error" role="alert" hidden></span>
        </div>

        <div class="row-2">
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="hello@email.com"
              autocomplete="off"
              aria-describedby="email-error"
            />
            <span
              id="email-error"
              class="field-error"
              role="alert"
              hidden
            ></span>
          </div>
          <div class="field">
            <label for="phone">WhatsApp / Phone</label>
            <input
              type="tel"
              id="phone"
              placeholder="+62 8xx xxxx xxxx"
              autocomplete="off"
            />
          </div>
        </div>

        <hr class="divider" />

        <div class="field">
          <label>Products I'm Interested In</label>
          <div class="products-grid">
            <label class="product-item">
              <input type="checkbox" name="product" value="biochar" />
              <span class="product-label"
                ><span class="product-icon">🌱</span
                ><span class="product-name">Biochar</span></span
              >
            </label>
            <label class="product-item">
              <input type="checkbox" name="product" value="briquettes" />
              <span class="product-label"
                ><span class="product-icon">🔥</span
                ><span class="product-name">Bio-Briquettes</span></span
              >
            </label>
            <label class="product-item">
              <input type="checkbox" name="product" value="compost" />
              <span class="product-label"
                ><span class="product-icon">♻️</span
                ><span class="product-name">Compost</span></span
              >
            </label>
            <label class="product-item">
              <input type="checkbox" name="product" value="coaster" />
              <span class="product-label"
                ><span class="product-icon">☕</span
                ><span class="product-name">Coaster</span></span
              >
            </label>
            <label class="product-item">
              <input type="checkbox" name="product" value="candles" />
              <span class="product-label"
                ><span class="product-icon">🕯️</span
                ><span class="product-name">Scented Candles</span></span
              >
            </label>
            <label class="product-item">
              <input type="checkbox" name="product" value="soap" />
              <span class="product-label"
                ><span class="product-icon">🧼</span
                ><span class="product-name">Coffee Soap</span></span
              >
            </label>
          </div>
        </div>

        <hr class="divider" />

        <div class="field">
          <label>Overall Impression</label>
          <div
            class="stars"
            role="radiogroup"
            aria-label="Rating 1 sampai 5 bintang"
          >
            <input type="radio" name="rating" id="s5" value="5" /><label
              for="s5"
              aria-label="5 bintang"
              >★</label
            >
            <input type="radio" name="rating" id="s4" value="4" /><label
              for="s4"
              aria-label="4 bintang"
              >★</label
            >
            <input type="radio" name="rating" id="s3" value="3" /><label
              for="s3"
              aria-label="3 bintang"
              >★</label
            >
            <input type="radio" name="rating" id="s2" value="2" /><label
              for="s2"
              aria-label="2 bintang"
              >★</label
            >
            <input type="radio" name="rating" id="s1" value="1" /><label
              for="s1"
              aria-label="1 bintang"
              >★</label
            >
          </div>
        </div>

        <div class="field">
          <label for="comments">Comments &amp; Suggestions</label>
          <textarea
            id="comments"
            placeholder="Share your thoughts, ideas, or questions about Rebru…"
          ></textarea>
        </div>

        <button class="btn-submit" id="submitBtn" type="button">
          Submit Feedback →
        </button>
      </div>

      <div class="thankyou" id="thankyou">
        <div class="ty-icon" aria-hidden="true">✓</div>
        <div class="ty-title">Terima Kasih!</div>
        <p class="ty-sub">
          Thank you for visiting Rebru's booth. Your feedback means a lot to us
          and helps us build a better circular economy. 🌿
        </p>
        <button class="btn-reset" type="button" id="resetBtn">
          Next Visitor
        </button>
      </div>
    </div>

    <div id="toast"></div>

    <!-- Supabase CDN — UMD build, expose window.supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script>
      // ── Init Supabase ─────────────────────────────────────────────
      const { createClient } = window.supabase;
      const db = createClient(
        "https://eldrclunicbxtapgbcms.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZHJjbHVuaWNieHRhcGdiY21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzQ2MjIsImV4cCI6MjA5NDI1MDYyMn0.75a56wGtRecBTHD6frS9YJdVuIBG5t-uzo1HXcBDvwE",
        { auth: { persistSession: false } },
      );
      console.log("[Rebru] ✓ Supabase client ready");

      // ── Cache produk ──────────────────────────────────────────────
      let _productCache = null;
      async function getProducts() {
        if (_productCache) return { data: _productCache, error: null };
        const { data, error } = await db
          .from("products")
          .select("id, name, slug")
          .order("name");
        if (!error) _productCache = data;
        return { data, error };
      }

      // ── DOM refs ──────────────────────────────────────────────────
      const $ = (id) => document.getElementById(id);
      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // ── Validation ────────────────────────────────────────────────
      function validateForm() {
        const errors = {};
        if (!$("name").value.trim()) errors.name = "Nama wajib diisi.";
        const email = $("email").value.trim();
        if (email && !EMAIL_RE.test(email))
          errors.email = "Format email tidak valid.";
        return { valid: Object.keys(errors).length === 0, errors };
      }

      function setFieldError(id, msg) {
        const el = $(id + "-error");
        if (!el) return;
        $(id).setAttribute("aria-invalid", "true");
        el.textContent = msg;
        el.hidden = false;
      }
      function clearFieldError(id) {
        const el = $(id + "-error");
        if (!el) return;
        $(id).removeAttribute("aria-invalid");
        el.textContent = "";
        el.hidden = true;
      }

      // ── Toast ─────────────────────────────────────────────────────
      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("toast--visible");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("toast--visible"), 5000);
      }

      // ── Button loading state ──────────────────────────────────────
      function setLoading(on) {
        $("submitBtn").disabled = on;
        $("submitBtn").textContent = on ? "Mengirim…" : "Submit Feedback →";
      }

      // ── Submit ────────────────────────────────────────────────────
      async function handleSubmit() {
        clearFieldError("name");
        clearFieldError("email");

        const { valid, errors } = validateForm();
        if (!valid) {
          Object.entries(errors).forEach(([f, m]) => setFieldError(f, m));
          $(Object.keys(errors)[0])?.focus();
          return;
        }

        setLoading(true);
        try {
          // Ambil produk
          const { data: products, error: pErr } = await getProducts();
          if (pErr) throw new Error("Gagal memuat data produk.");

          const productMap = Object.fromEntries(
            products.map((p) => [p.slug, p.id]),
          );
          const checkedSlugs = [
            ...document.querySelectorAll('input[name="product"]:checked'),
          ].map((el) => el.value);
          const ratingEl = document.querySelector(
            'input[name="rating"]:checked',
          );

          const payload = {
            name: $("name").value.trim(),
            email: $("email").value.trim() || null,
            phone: $("phone").value.trim() || null,
            rating: ratingEl ? Number(ratingEl.value) : null,
            comments: $("comments").value.trim() || null,
          };

          // Insert visitor
          const { data: visitor, error: vErr } = await db
            .from("visitors")
            .insert(payload)
            .select("id")
            .single();
          if (vErr) throw new Error("Gagal menyimpan data: " + vErr.message);

          // Insert product interests
          const productIds = checkedSlugs
            .map((s) => productMap[s])
            .filter(Boolean);
          if (productIds.length) {
            const rows = productIds.map((pid) => ({
              visitor_id: visitor.id,
              product_id: pid,
            }));
            const { error: iErr } = await db
              .from("visitor_product_interests")
              .insert(rows);
            if (iErr)
              throw new Error(
                "Data tersimpan, tapi minat produk gagal dicatat.",
              );
          }

          // Sukses
          $("formSection").classList.add("hide");
          $("thankyou").classList.add("show");
        } catch (err) {
          showToast(err.message);
        } finally {
          setLoading(false);
        }
      }

      // ── Reset ─────────────────────────────────────────────────────
      function resetForm() {
        ["name", "email", "phone", "comments"].forEach(
          (id) => ($(id).value = ""),
        );
        document
          .querySelectorAll('input[type="checkbox"], input[type="radio"]')
          .forEach((el) => (el.checked = false));
        clearFieldError("name");
        clearFieldError("email");
        $("thankyou").classList.remove("show");
        $("formSection").classList.remove("hide");
        $("name").focus();
      }

      // ── Event listeners ───────────────────────────────────────────
      $("submitBtn").addEventListener("click", handleSubmit);
      $("resetBtn").addEventListener("click", resetForm);
      $("name").addEventListener("input", () => clearFieldError("name"));
      $("email").addEventListener("blur", () => {
        const v = $("email").value.trim();
        if (v && !EMAIL_RE.test(v))
          setFieldError("email", "Format email tidak valid.");
        else clearFieldError("email");
      });
    </script>
  </body>
</html>
